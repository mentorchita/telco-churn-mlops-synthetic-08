# =============================================================================
# monitoring/prometheus/prometheus.yml
# Prometheus scrape configuration for telco-churn-mlops-synthetic-07
#
# After editing, hot-reload without restart:
#   curl -X POST http://localhost:9090/-/reload
#
# Validate config:
#   docker run --rm -v $(pwd)/monitoring:/etc/prometheus \
#     prom/prometheus promtool check config /etc/prometheus/prometheus/prometheus.yml
# =============================================================================

global:
  scrape_interval:     15s   # Default scrape interval for all jobs
  evaluation_interval: 15s   # How often to evaluate alert rules
  scrape_timeout:      10s   # Per-scrape timeout

  # Labels attached to all time series and alerts from this instance
  external_labels:
    env:     'development'      # change to 'staging' / 'production' as needed
    project: 'telco-churn'
    team:    'ml-platform'

# ── Alertmanager connection ──────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      timeout: 10s

# ── Alert + recording rule files ────────────────────────────
rule_files:
  - '/etc/prometheus/rules/ml_alerts.yml'
  - '/etc/prometheus/rules/api_alerts.yml'
  - '/etc/prometheus/rules/infra_alerts.yml'
  - '/etc/prometheus/rules/recording_rules.yml'

# ══════════════════════════════════════════════════════════════
# SCRAPE CONFIGURATIONS
# Each job_name appears as label {job="..."} on all its metrics
# ══════════════════════════════════════════════════════════════
scrape_configs:

  # ── 1. Churn Prediction FastAPI ──────────────────────────
  # Exposes custom ML metrics via /metrics endpoint
  # (added by src/metrics.py + app.py integration)
  - job_name: 'churn-api'
    scrape_interval: 10s      # more frequent for prediction API
    scrape_timeout:  8s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']   # service name in docker-compose network
        labels:
          service:  'prediction-api'
          language: 'python'

  # ── 2. MLflow Tracking Server ────────────────────────────
  - job_name: 'mlflow'
    scrape_interval: 30s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mlflow:5000']
        labels:
          service: 'mlflow-tracking'

  # ── 3. Prometheus self-monitoring ────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── 4. Alertmanager ──────────────────────────────────────
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # ── 5. Node Exporter (host CPU/RAM/disk/network) ─────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host-metrics'
    relabel_configs:
      # Use container hostname as instance label
      - source_labels: [__address__]
        target_label: instance
        regex:        '([^:]+)(:[0-9]+)?'
        replacement:  '${1}'

  # ── 6. cAdvisor (Docker container metrics) ───────────────
  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'container-metrics'
    metric_relabel_configs:
      # Drop high-cardinality metrics we don't need
      - source_labels: [__name__]
        regex: 'container_tasks_state|container_memory_failures_total'
        action: drop
      # Keep only named containers (skip pause/infra containers)
      - source_labels: [container_label_com_docker_compose_service]
        regex: '^$'
        action: drop

  # ── 7. Pushgateway (drift exporter, Airflow DAGs) ─────────
  - job_name: 'pushgateway'
    honor_labels: true          # preserve labels from push clients
    static_configs:
      - targets: ['pushgateway:9091']
        labels:
          service: 'batch-metrics'

  # ── 8. Grafana ────────────────────────────────────────────
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

# ──────────────────────────────────────────────────────────────
