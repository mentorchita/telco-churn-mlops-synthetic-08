# =============================================================================
# monitoring/prometheus/prometheus.yml
# Виправлено для telco-churn-mlops-synthetic-08
#
# Зміни відносно попередньої версії:
#   1. churn-api: target змінено на 172.18.0.13:8000 (прямий IP)
#      Причина: сервіс 'api' не має container_name, тому DNS 'api:8000'
#      не резолюється. Постійне рішення — додати container_name: api
#      в docker-compose.yml (див. нижче).
#   2. mlflow: metrics_path змінено з /metrics на /health
#      Причина: mlflow server не expose Prometheus метрик за замовчуванням.
#      Тепер просто моніторимо чи сервіс живий (up == 1).
#   3. Додано fallback через IP для стабільності під час demo.
#
# Постійне рішення для api DNS (після змін в docker-compose.yml):
#   Додати в сервіс api:
#     container_name: churn-api
#   Тоді target повернути на 'churn-api:8000'
#
# Hot-reload після змін (без рестарту):
#   curl -X POST http://localhost:9090/-/reload
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    env:     'development'
    project: 'telco-churn'
    team:    'ml-platform'

# ── Alertmanager ─────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

# ── Rules ────────────────────────────────────────────────────
rule_files:
  - '/etc/prometheus/rules/ml_alerts.yml'
  - '/etc/prometheus/rules/api_alerts.yml'
  - '/etc/prometheus/rules/infra_alerts.yml'
  - '/etc/prometheus/rules/recording_rules.yml'

# ════════════════════════════════════════════════════════════
scrape_configs:

  # ── 1. Churn Prediction FastAPI ───────────────────────────
  # Тепер резолюється через container_name: churn-api в docker-compose.yml
  - job_name: 'churn-api'
    scrape_interval: 10s
    scrape_timeout:  8s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['churn-api:8000']
        labels:
          service:  'prediction-api'
          language: 'python'

  # ── 2. MLflow Tracking Server ─────────────────────────────
  # ВИПРАВЛЕНО: mlflow не має /metrics endpoint
  # Використовуємо / для перевірки що сервіс живий (up == 1)
  # Метрика: up{job="mlflow"} — 1 якщо відповідає, 0 якщо ні
  - job_name: 'mlflow'
    scrape_interval: 30s
    scrape_timeout:  10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mlflow.int:5000']
        labels:
          service: 'mlflow-tracking'
    #metric_relabel_configs:
      # MLflow не має Prometheus метрик — scrape поверне 404
      # але метрика 'up' все одно буде встановлена (1 = живий, 0 = мертвий)
      # Це і є головне що нам потрібно для алертингу

  # ── 3. Prometheus self-monitoring ────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── 4. Alertmanager ──────────────────────────────────────
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # ── 5. Node Exporter ─────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host-metrics'

  # ── 6. cAdvisor ──────────────────────────────────────────
  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'container-metrics'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_tasks_state|container_memory_failures_total'
        action: drop

  # ── 7. Pushgateway ────────────────────────────────────────
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
        labels:
          service: 'batch-metrics'

  # ── 8. Grafana ────────────────────────────────────────────
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
